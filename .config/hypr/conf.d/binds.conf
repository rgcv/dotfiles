# See https://wiki.hypr.land/Configuring/Binds/ for more
$mod = SUPER
$left = H
$down = J
$up = K
$right = L


# synopsis: MODS, key, dispatcher, params
bind = $mod, Return, exec, $bin/terminal
bind = $mod, Q, killactive,
bind = $mod, F, fullscreen
bind = $mod, Space, exec, $scripts/menu
bind = $mod, V, togglesplit, # dwindle
bind = $mod, X, exec, hyprlock
bind = $mod SHIFT, Space, togglefloating,
bind = $mod, S, pin,
bind = $mod, T, togglegroup
bind = CTRL, Space, exec, hyprctl switchxkblayout all next
bind = $mod, Tab, exec, $(hyprctl activewindow -j | jq '.floating') && hyprctl dispatch cyclenext tiled || hyprctl dispatch cyclenext floating

# Move focus with mod + hjkl/cursors
bind = $mod,  left,  movefocus, l
bind = $mod,  down,  movefocus, d
bind = $mod,  up,    movefocus, u
bind = $mod,  right, movefocus, r
bind = $mod, $left,  movefocus, l
bind = $mod, $down,  movefocus, d
bind = $mod, $up,    movefocus, u
bind = $mod, $right, movefocus, r
# Move focus with mod + hjkl/cursors
bind = $mod,  left,  changegroupactive, b
bind = $mod,  down,  changegroupactive, b
bind = $mod,  up,    changegroupactive, f
bind = $mod,  right, changegroupactive, f
bind = $mod, $left,  changegroupactive, b
bind = $mod, $down,  changegroupactive, b
bind = $mod, $up,    changegroupactive, f
bind = $mod, $right, changegroupactive, f


# Move window with mod + SHIFT + hjkl/cursors
bind = $mod SHIFT,  left,  movewindoworgroup, l
bind = $mod SHIFT,  down,  movewindoworgroup, d
bind = $mod SHIFT,  up,    movewindoworgroup, u
bind = $mod SHIFT,  right, movewindoworgroup, r
bind = $mod SHIFT, $left,  movewindoworgroup, l
bind = $mod SHIFT, $down,  movewindoworgroup, d
bind = $mod SHIFT, $up,    movewindoworgroup, u
bind = $mod SHIFT, $right, movewindoworgroup, r

# Resize active window with mode + yuio
bind = $mod, Y, resizeactive, -10%   0
bind = $mod, U, resizeactive,   0  -10%
bind = $mod, I, resizeactive,   0   10%
bind = $mod, O, resizeactive,  10%   0
bind = $mod SHIFT, U, resizeactive, -10% -10%
bind = $mod SHIFT, I, resizeactive,  10%  10%

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT, 0, movetoworkspacesilent, 10

# Move current workspace to output elsewhere
bind = $mod CTRL,  left,  movecurrentworkspacetomonitor, l
bind = $mod CTRL,  down,  movecurrentworkspacetomonitor, d
bind = $mod CTRL,  up,    movecurrentworkspacetomonitor, u
bind = $mod CTRL,  right, movecurrentworkspacetomonitor, r
bind = $mod CTRL, $left,  movecurrentworkspacetomonitor, l
bind = $mod CTRL, $down,  movecurrentworkspacetomonitor, d
bind = $mod CTRL, $up,    movecurrentworkspacetomonitor, u
bind = $mod CTRL, $right, movecurrentworkspacetomonitor, r


# Scroll through existing workspaces with mod + scrol
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bindm = $mod SHIFT, mouse:273, resizewindow 1

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = SHIFT, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SOURCE@ 5%+
bindel = SHIFT, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-
bindel = SHIFT, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshotting
# windows-like
bind = $mod SHIFT, S, exec, $scripts/grimblast --notify --freeze -- copysave area
bind = , Print, exec, $scripts/grimblast --notify -- copy screen
bind = ALT, Print, exec, $scripts/grimblast --notify -- copy active
bind = $mod, Print, exec, $scripts/grimblast --notify -- copysave screen
# alternative
bind = $mod,            P, exec, $scripts/grimblast --notify copy screen
bind = $mod       ALT,  P, exec, $scripts/grimblast --notify copy output
bind = $mod       CTRL, P, exec, $scripts/grimblast --notify --freeze copy area
bind = $mod SHIFT     , P, exec, $scripts/grimblast --notify save screen
bind = $mod SHIFT ALT,  P, exec, $scripts/grimblast --notify save output
bind = $mod SHIFT CTRL, P, exec, $scripts/grimblast --notify --freeze save area

# Submap
# system
bind = $mod SHIFT, X, submap, system
submap = system, reset
bind = , U, exec, systemctl poweroff
bind = , S, exec, systemctl suspend
bind = , L, exec, loginctl terminate-user $USER
bind = , R, exec, systemctl reboot
bind = , escape, submap, reset
submap = reset
