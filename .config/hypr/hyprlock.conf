# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#

$font = sans-serif

source = ~/.config/hypr/mocha.conf

general {
    ignore_empty_input = true
}

animations {
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor =
    font_color = $text
    font_family = Monospace

    outline_thickness = 0
    inner_color = rgba($lavenderAlpha08) # translucent
    outer_color = rgba($lavenderAlphaee)
    check_color = rgba($blueAlpha40)
    placeholder_text = <span fgcolor='##$textAlpha80'><i>Enter password...</i></span>

    fail_color = rgba($maroonAlpha40)
    fail_text = <span foreground='##$maroonAlpha'>$PAMFAIL</span>

    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    size = 20%, 5%
    position = 0, -20
}

# TIME
label {
    monitor =
    text = <b>$TIME</b> # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font
    color = $text

    position = 0, -150
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font
    color = $text

    position = 0, -300
    valign = top
}

label {
    monitor = -1
    text = $LAYOUT[en,en(intl)]
    font_size = 24
    onclick = hyprctl switchxkblayout all next

    position = 0, -110
}
