## variables
# local binaries
set $bin ~/.local/bin
set $config ~/.config/sway
set $scripts $config/scripts

# dmenu/bemenu
set $menu     bemenu
set $menu_run bemenu-run

# terminal
set $term $bin/terminal

# modifier key (Mod1 = Alt, Mod4 = Win)
set $mod Mod4
set $alt Mod1

# home row dir keys
set $left  h
set $down  j
set $up    k
set $right l

